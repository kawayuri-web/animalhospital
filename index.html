<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>滑石きたむら動物病院</title>
    <meta name="description" content="滑石きたむら動物病院の公式サイトです" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="container">
      <header class="header">
        <div class="inner">
          <div class="header__logo">
            <div class="header-logo__image">
              <img src="./images/足跡_1.svg" alt="滑石きたむら動物病院" />
            </div>
            <h1><a href="#">滑石きたむら動物病院</a></h1>
          </div>
          <nav class="header__nav pc">
            <ul class="header-nav__items">
              <li class="header-nav__item">
                <a href="#greeting">ご挨拶</a>
              </li>
              <li class="header-nav__item">
                <a href="#">強み</a>
              </li>
              <li class="header-nav__item">
                <a href="#">サービス</a>
              </li>
              <li class="header-nav__item">
                <a href="#">お知らせ</a>
              </li>
              <li class="header-nav__item">
                <a href="#">アクセス</a>
              </li>
              <li class="header-nav__item">
                <a href="#">お問い合わせ</a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <div class="fv">
        <div class="fv__image">
          <picture>
            <source media="(min-width: 768px)" srcset="./images/fv.jpg" />
            <img
              src="./images/fv_sp.jpg"
              alt="滑石きたむら動物病院は大切な家族の
ホームドクターです"
            />
          </picture>
        </div>
        <div class="fv__contents">
          <div class="inner">
            <div class="fv-contents__textarea">
              <h2>滑石きたむら動物病院は</h2>
              <p>大切な家族の<br />ホームドクターです</p>
            </div>
          </div>
        </div>
      </div>

      <section id="greeting" class="greeting">
        <div class="inner">
          <div class="greeting__textarea">
            <div class="greeting__title">
              <h2>動物たちの健康で<br class="sp">幸せな生活をサポート</h2>
            </div>
            <div class="greeting__message">
              <p>
                当院は地域に密着し、皆さまの大切な家族の一員である動物たちのホームドクターを目指しています。<br />
                緊急時だけではなく、日常のちょっとした不安や違和感などお気軽にご相談ください。<br />
                動物たちが健康で幸せな生活を送ることができるようサポートいたします。
              </p>
            </div>
            <div class="greeting__deco">
              <picture>
                <source media="(min-width: 768px)" srcset="./images/足跡_pc.png">
                <img src="./images/足跡_sp.png" alt="ご挨拶">
              </picture>
            </div>
          </div>
        </div>
      </section>
      <main></main>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
